<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      margin-bottom: 24px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 20px;
      height: 1.6em;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.taken { cursor: default; }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.winner {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.5s ease-in-out 3;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    #reset {
      margin-top: 28px;
      padding: 12px 36px;
      font-size: 1rem;
      letter-spacing: 2px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    #reset:hover { background: #c73652; transform: scale(1.04); }

    #score {
      display: flex;
      gap: 32px;
      margin-bottom: 20px;
      font-size: 1rem;
      color: #aaa;
    }

    #score span { text-align: center; }
    #score strong { display: block; font-size: 1.6rem; }
    #score .label-x { color: #e94560; }
    #score .label-o { color: #a8dadc; }
  </style>
</head>
<body>
  <h1>TIC TAC TOE</h1>

  <div id="score">
    <span><div class="label-x">X</div><strong id="score-x">0</strong></span>
    <span><div style="color:#aaa">Draws</div><strong id="score-d">0</strong></span>
    <span><div class="label-o">O</div><strong id="score-o">0</strong></span>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="reset">NEW GAME</button>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const scoreX = document.getElementById('score-x');
    const scoreO = document.getElementById('score-o');
    const scoreD = document.getElementById('score-d');

    let board, current, over;

    function init() {
      board = Array(9).fill('');
      current = 'X';
      over = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      status.textContent = "X's turn";
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      if (board.every(v => v)) return { winner: null, line: [] };
      return null;
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (over || board[i]) return;

        board[i] = current;
        cell.textContent = current === 'X' ? '✕' : '○';
        cell.classList.add('taken', current.toLowerCase());

        const result = checkWinner();
        if (result) {
          over = true;
          if (result.winner) {
            result.line.forEach(idx => cells[idx].classList.add('winner'));
            status.textContent = `${result.winner} wins!`;
            result.winner === 'X'
              ? scoreX.textContent = +scoreX.textContent + 1
              : scoreO.textContent = +scoreO.textContent + 1;
          } else {
            status.textContent = "It's a draw!";
            scoreD.textContent = +scoreD.textContent + 1;
          }
        } else {
          current = current === 'X' ? 'O' : 'X';
          status.textContent = `${current}'s turn`;
        }
      });
    });

    document.getElementById('reset').addEventListener('click', init);

    init();
  </script>
</body>
</html>
